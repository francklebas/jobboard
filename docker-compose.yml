services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - SCRAPE_INTERVAL_HOURS=6
    depends_on:
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: restart
          path: ./api

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_URL=http://localhost:8000
      - NITRO_API_URL=http://api:8000
    depends_on:
      - api
    develop:
      watch:
        - action: restart
          path: ./frontend

volumes:
  redis-data:
