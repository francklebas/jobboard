services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-21600}
    develop:
      watch:
        - action: restart
          path: ./api

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_URL=https://jobboard-api-stockholm.duckdns.org
      - NITRO_API_URL=http://api:8000
    depends_on:
      - api
    develop:
      watch:
        - action: restart
          path: ./frontend

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend

volumes:
  caddy-data:
  caddy-config:
